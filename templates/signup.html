{% extends 'base.html' %}
{% block navbar %}{% endblock %}

{% block title %}Sign Up - CourseMatch{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2>Create Account</h2>
        <p>Join CourseMatch to get personalized learning paths.</p>

        <form method="POST" action="{{ url_for('signup') }}">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn-primary w-100">Create Account</button>
        </form>

        <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </div>
</div>
{% endblock %}
